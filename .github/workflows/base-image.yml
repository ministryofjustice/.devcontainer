---
name: Base Image

on:
  pull_request:
    branches:
      - main
    paths:
      - images/base/**
  push:
    branches:
      - main
    paths:
      - images/base/**

permissions: {}

jobs:
  preflight-checks:
    if: ${{ github.ref != 'refs/heads/main' }}
    name: Preflight Checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: read
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check Version
        id: check_version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "${GH_TOKEN}" | skopeo login ghcr.io --username "${GITHUB_ACTOR}" --password-stdin

          version=$(jq -r '.version' "images/base/config.json")
          export version

          if skopeo list-tags "docker://ghcr.io/ministryofjustice/devcontainer-base"; then
            image_exists=true
          else
            echo "image_exists=false" >>"${GITHUB_ENV}"
            echo "tag_exists=false" >>"${GITHUB_ENV}"
          fi

          if [[ "${image_exists}" == "true" ]]; then
            checkTag=$(skopeo list-tags "docker://ghcr.io/ministryofjustice/devcontainer-base" | jq -r --arg version "${version}" '.Tags | index($version)')
            export checkTag

            if [[ -z "${checkTag}" ]]; then
              echo "tag_exists=false" >>"${GITHUB_ENV}"
            else
              echo "tag_exists=true" >>"${GITHUB_ENV}"
            fi
          fi

      - name: Check CHANGELOG Updates
        id: check_changelog_updates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mainSha=$(gh api --method GET "/repos/${GITHUB_REPOSITORY}/contents/images/base/CHANGELOG.md" --field ref="main" | jq -r '.sha')
          branchSha=$(gh api --method GET "/repos/${GITHUB_REPOSITORY}/contents/images/base/CHANGELOG.md" --field ref="${GITHUB_HEAD_REF}" | jq -r '.sha')

          if [[ -z "${mainSha}" ]]; then
            echo "SHA not found for main branch, assuming CHANGELOG.md does not exist"
          elif [[ -z "${branchSha}" ]]; then
            echo "SHA not found for ${GITHUB_HEAD_REF} branch, assuming CHANGELOG.md does not exist"
            echo "changelog_updated=false" >>"${GITHUB_ENV}"
          elif [[ "${mainSha}" == "${branchSha}" ]]; then
            echo "CHANGELOG.md matches main branch, needs to be updated"
            echo "changelog_updated=false" >>"${GITHUB_ENV}"
          elif [[ "${mainSha}" != "${branchSha}" ]]; then
            echo "CHANGELOG.md does not match main branch, does not need to be updated"
            echo "changelog_updated=true" >>"${GITHUB_ENV}"
          fi

      - name: Evaluate Checks
        id: evaluate_checks
        run: |
          if [[ "${TAG_EXISTS}" == "true" ]]; then
            echo "::error::FAIL: Container tag already exists"
            export failBuild="true"
          else
            echo "::notice::OK: Container tag does not exist"
            export failBuild="false"
          fi

          if [[ "${CHANGELOG_UPDATED}" == "true" ]]; then
            echo "::notice::OK: CHANGELOG.md has been updated"
            export failBuild="false"
          elif [[ "${CHANGELOG_UPDATED}" == "false" ]]; then
            echo "::error::FAIL: CHANGELOG.md needs to be updated"
            export failBuild="true"
          fi

          if [[ "${failBuild}" == "true" ]]; then
            exit 1
          fi

  build-test:
    if: ${{ github.ref != 'refs/heads/main' }}
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: [linux/amd64, linux/arm64]
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set Up Container Structure Test
        id: setup_container_structure_test
        uses: ministryofjustice/action-setup-container-structure-test@d0636fa19d04c3fc71c30ae4eb8da03be63dbd4b # v1.0.0

      - name: Set Up QEMU
        id: setup_qemu
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set Up Docker Buildx
        id: setup_docker_buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Image
        id: build_image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          file: images/base/Dockerfile
          context: images/base
          platforms: ${{ matrix.platform }}
          load: true
          tags: ghcr.io/ministryofjustice/devcontainer-base:${{ github.sha }}

      - name: Container Structure Test
        id: container_structure_test
        run: |
          container-structure-test test \
            --platform "${{ matrix.platform }}" \
            --config "images/base/test/container-structure-test.yml" \
            --image "ghcr.io/ministryofjustice/devcontainer-base:${{ github.sha }}"

  publish:
    if: ${{ github.ref == 'refs/heads/main' }}
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set Up QEMU
        id: setup_qemu
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set Up Docker Buildx
        id: setup_docker_buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Log in to GitHub Container Registry
        id: login_ghcr
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare Environment
        id: prepare_environment
        run: |
          version=$(jq -r '.version' "images/base/config.json")
          echo "version=${version}" >>"${GITHUB_OUTPUT}"

      - name: Publish Image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          file: images/base/Dockerfile
          context: images/base
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ministryofjustice/devcontainer-base:${{ steps.prepare_environment.outputs.version }}
            ghcr.io/ministryofjustice/devcontainer-base:latest
