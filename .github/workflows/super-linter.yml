---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@fb65e56e08212c6dd7b7fc3fae73c018efad8fa1 # v3.6.0
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
