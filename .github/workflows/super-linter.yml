---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@27dbc646878cabcd2a879c49639d6a3d23510d53 # v3.2.0
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
