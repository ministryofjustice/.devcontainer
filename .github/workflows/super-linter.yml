---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@f81658c938374c2f5a69b0ad8e2c89948e29aad0 # v4.0.10
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
