---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@e516e7ba538136d02633f409fdb81ed6c34efc49 # v3.4.0
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
