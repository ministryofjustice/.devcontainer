---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@d3465269fd035f597644989456f9fcc0c44f8e50 # v4.0.5
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
