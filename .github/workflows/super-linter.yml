---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@e22f0c9cafa7528d5594c19fe1401ec893424272 # v4.0.4
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
