---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@078037621080098635691c669d30330087880fa8 # v3.5.1
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
