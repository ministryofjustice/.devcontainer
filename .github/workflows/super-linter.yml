---
name: Super Linter

on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  super-linter:
    name: Super Linter
    permissions:
      contents: read
      packages: read
      statuses: write
    uses: ministryofjustice/data-platform-github-actions/.github/workflows/super-linter.yml@ad85a30531b1adaa06bc6e9daed95d9930f28687 # v3.4.2
    with:
      super-linter-variables: |
        {
          "VALIDATE_JSCPD": false
        }
